name: agent_dance
description: Agent Dance - AI assistant mobile app for Agents Agent API.
publish_to: 'none'
version: 0.0.1+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.2
  drift: ^2.22.1
  sqlite3_flutter_libs: ^0.5.28
  path_provider: ^2.1.5
  path: ^1.9.0
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.3.3
  flutter_markdown_plus: ^1.0.7
  url_launcher: ^6.3.1
  image_picker: ^1.1.2
  flutter_image_compress: ^2.3.0
  permission_handler: ^11.3.1
  uuid: ^4.5.1
  intl: ^0.19.0
  local_auth: ^2.3.0
  package_info_plus: ^8.1.2
  volume_key_board: ^0.0.2
  flutter_local_notifications: ^18.0.1
  flutter_foreground_task: ^8.17.0
  wakelock_plus: ^1.2.10

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  drift_dev: ^2.22.1
  build_runner: ^2.4.13
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icon.png
  adaptive_icon_background: "#0d0d1a"
  adaptive_icon_foreground: assets/icon.png
  min_sdk_android: 21
  remove_alpha_ios: true

flutter:
  uses-material-design: true
